<script>
const SB_URL='https://vnqsmzgebjpdizwtysnw.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZucXNtemdlYmpwZGl6d3R5c253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MTk2NjQsImV4cCI6MjA5MDE5NTY2NH0.vNHFEGyoT44lq6SzmiAl9i453iw2KHIrmoSFXvrkcL0';
const sb=supabase.createClient(SB_URL,SB_KEY);

document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('error-msg');
  if(!email||!password){err.textContent='Please enter email and password.';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Signing in…';err.style.display='none';
  try{
    const{data,error}=await sb.auth.signInWithPassword({email,password});
    if(error)throw error;
    sessionStorage.setItem('bejaan_role','admin');
    sessionStorage.setItem('bejaan_name',data.user.email);
    window.location.replace('dashboard.html');
  }catch(e){
    err.textContent=e.message||'Login failed.';
    err.style.display='block';
    btn.disabled=false;
    btn.textContent='Sign In';
  }
}
</script>
