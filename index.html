


<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bejaan Hotel — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #b89558;
      --gold-light: #d4b47a;
      --dark: #0d0d0d;
      --surface: #141414;
      --surface2: #1c1c1c;
      --border: rgba(184,149,88,0.2);
      --text: #e8e0d0;
      --muted: #7a7060;
    }

    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
    }

    body {
      display: flex;
      min-height: 100vh;
      overflow: hidden;
    }

    /* LEFT PANEL */
    .left {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 60px;
      overflow: hidden;
    }

    .left::before {
      content: '';
      position: absolute;
      inset: 0;
      background: 
        linear-gradient(160deg, rgba(184,149,88,0.08) 0%, transparent 50%),
        repeating-linear-gradient(
          45deg,
          transparent,
          transparent 40px,
          rgba(184,149,88,0.03) 40px,
          rgba(184,149,88,0.03) 41px
        );
    }

    .left::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, transparent 60%, var(--dark));
    }

    .ornament {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 500px;
      height: 500px;
      opacity: 0.04;
    }

    .left-content {
      position: relative;
      z-index: 1;
    }

    .left-content .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-size: 52px;
      font-weight: 300;
      line-height: 1.15;
      color: var(--text);
      margin-bottom: 20px;
    }

    .left-content .tagline em {
      font-style: italic;
      color: var(--gold-light);
    }

    .left-content p {
      font-size: 13px;
      letter-spacing: 0.12em;
      color: var(--muted);
      text-transform: uppercase;
    }

    .gold-line {
      width: 48px;
      height: 1px;
      background: var(--gold);
      margin-bottom: 28px;
    }

    /* RIGHT PANEL */
    .right {
      width: 440px;
      min-height: 100vh;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 60px 48px;
      position: relative;
    }

    .right::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
    }

    .brand {
      margin-bottom: 48px;
    }

    .brand-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text);
    }

    .brand-sub {
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 4px;
    }

    .form-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      color: var(--text);
      margin-bottom: 32px;
    }

    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 14px;
      padding: 14px 16px;
      outline: none;
      transition: border-color 0.25s;
      border-radius: 2px;
    }

    .field input::placeholder { color: var(--muted); }

    .field input:focus {
      border-color: var(--gold);
    }

    .btn {
      width: 100%;
      margin-top: 8px;
      padding: 15px;
      background: var(--gold);
      color: var(--dark);
      font-family: 'Jost', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      transition: background 0.25s, opacity 0.25s;
      border-radius: 2px;
    }

    .btn:hover { background: var(--gold-light); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      display: none;
      margin-top: 16px;
      padding: 12px 14px;
      background: rgba(180,60,60,0.12);
      border: 1px solid rgba(180,60,60,0.3);
      color: #e07070;
      font-size: 12px;
      letter-spacing: 0.04em;
      border-radius: 2px;
    }

    .footer-note {
      margin-top: 40px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
      border-top: 1px solid var(--border);
      padding-top: 24px;
    }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .right > * {
      animation: fadeUp 0.6s ease both;
    }
    .brand        { animation-delay: 0.1s; }
    .form-title   { animation-delay: 0.2s; }
    .field:nth-child(1) { animation-delay: 0.25s; }
    .field:nth-child(2) { animation-delay: 0.3s; }
    .btn          { animation-delay: 0.35s; }

    @media (max-width: 768px) {
      .left { display: none; }
      .right { width: 100%; border-left: none; }
    }
  </style>
</head>
<body>

  <!-- LEFT -->
  <div class="left">
    <svg class="ornament" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="80" stroke="white" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="60" stroke="white" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="40" stroke="white" stroke-width="0.5"/>
      <line x1="20" y1="100" x2="180" y2="100" stroke="white" stroke-width="0.5"/>
      <line x1="100" y1="20" x2="100" y2="180" stroke="white" stroke-width="0.5"/>
      <line x1="43" y1="43" x2="157" y2="157" stroke="white" stroke-width="0.5"/>
      <line x1="157" y1="43" x2="43" y2="157" stroke="white" stroke-width="0.5"/>
      <circle cx="100" cy="100" r="4" fill="white"/>
    </svg>
    <div class="left-content">
      <div class="gold-line"></div>
      <div class="tagline">Where every stay<br>becomes <em>a story</em><br>worth telling.</div>
      <p>Bejaan Hotel &amp; Residences</p>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">
    <div class="brand">
      <div class="brand-name">Bejaan</div>
      <div class="brand-sub">Hotel Management Portal</div>
    </div>

    <div class="form-title">Sign in to continue</div>

    <div class="field">
      <label for="login-email">Email address</label>
      <input type="email" id="login-email" placeholder="you@example.com" autocomplete="email"/>
    </div>

    <div class="field">
      <label for="login-password">Password</label>
      <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password"/>
    </div>

    <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>

    <div class="error-msg" id="error-msg"></div>

    <div class="footer-note">
      Authorised personnel only. All activity is monitored and logged.
    </div>
  </div>

  <script>
    // Simple access credentials — change these anytime
    const VALID_USERS = [
      { email: 'tariqbooni@yahoo.com',    password: 'Bejaan2026' },
      { email: 'tariiq.haasan@gmail.com', password: 'Bejaan2026' },
    ];

    // If already logged in, skip to dashboard
    if (sessionStorage.getItem('bejaan_auth') === 'true') {
      window.location.replace('dashboard.html');
    }

    document.getElementById('login-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });

    function doLogin() {
      const email    = document.getElementById('login-email').value.trim().toLowerCase();
      const password = document.getElementById('login-password').value;
      const btn      = document.getElementById('login-btn');
      const err      = document.getElementById('error-msg');

      err.style.display = 'none';

      if (!email || !password) {
        err.textContent = 'Please enter your email and password.';
        err.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Signing in…';

      const match = VALID_USERS.find(u =>
        u.email.toLowerCase() === email && u.password === password
      );

      if (match) {
        sessionStorage.setItem('bejaan_auth', 'true');
        sessionStorage.setItem('bejaan_name', match.email);
        sessionStorage.setItem('bejaan_role', 'admin');
        window.location.replace('dashboard.html');
      } else {
        err.textContent = 'Incorrect email or password.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }
  </script>
</body>
</html>
