

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bejaan Hotel — Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:#f5f7f5;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.login-wrap{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:400px;box-shadow:0 4px 24px rgba(0,0,0,.08);border:1px solid #dde8e2;}
.login-logo{font-family:'Playfair Display',serif;font-size:22px;color:#4caf7d;margin-bottom:4px;}
.login-sub{font-size:12px;color:#5a7066;margin-bottom:32px;}
.form-group{display:flex;flex-direction:column;gap:4px;margin-bottom:16px;}
.form-group label{font-size:11px;color:#5a7066;font-weight:500;text-transform:uppercase;letter-spacing:.05em;}
.form-group input{background:#f0f4f1;border:1px solid #dde8e2;border-radius:8px;padding:10px 12px;color:#111c17;font-family:'DM Sans',sans-serif;font-size:14px;transition:border-color .15s;}
.form-group input:focus{outline:none;border-color:#4caf7d;}
.btn-login{width:100%;padding:12px;background:#4caf7d;color:#fff;border:none;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .15s;}
.btn-login:hover{background:#2d8a5e;}
.btn-login:disabled{opacity:.6;cursor:not-allowed;}
.error-msg{background:#fdf0f0;border:1px solid #f0c0c0;color:#c04040;border-radius:8px;padding:10px 14px;font-size:13px;margin-bottom:16px;display:none;}
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">Bejaan Hotel</div>
  <div class="login-sub">Project Dashboard — Sign in to continue</div>
  <div class="error-msg" id="error-msg"></div>
  <div class="form-group">
    <label>Email</label>
    <input type="email" id="login-email" placeholder="your@email.com" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Password</label>
    <input type="password" id="login-password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-login" id="login-btn" onclick="doLogin()">Sign In</button>
</div>
<script>
const SB_URL='https://vnqsmzgebjpdizwtysnw.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZucXNtemdlYmpwZGl6d3R5c253Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2MTk2NjQsImV4cCI6MjA5MDE5NTY2NH0.vNHFEGyoT44lq6SzmiAl9i453iw2KHIrmoSFXvrkcL0';
const sb=supabase.createClient(SB_URL,SB_KEY);
sb.auth.getSession().then(({data:{session}})=>{if(session)window.location.href='dashboard.html';});
document.getElementById('login-password').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
async function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const password=document.getElementById('login-password').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('error-msg');
  if(!email||!password){err.textContent='Please enter email and password.';err.style.display='block';return;}
  btn.disabled=true;btn.textContent='Signing in…';err.style.display='none';
  const {data,error}=await sb.auth.signInWithPassword({email,password});
  if(error){err.textContent=error.message;err.style.display='block';btn.disabled=false;btn.textContent='Sign In';return;}
  const {data:profile}=await sb.from('bejaan_profiles').select('*').eq('id',data.user.id).single();
  if(!profile||!profile.is_active){await sb.auth.signOut();err.textContent='Your account is inactive. Contact admin.';err.style.display='block';btn.disabled=false;btn.textContent='Sign In';return;}
  sessionStorage.setItem('bejaan_role',profile.role);
  sessionStorage.setItem('bejaan_name',profile.full_name||profile.email);
  window.location.href='dashboard.html';
}
</script>
</body>
</html>
